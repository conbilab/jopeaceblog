# ============================================================
#  피스노트 글쓰기 편집기 (Sveltia CMS · Decap 호환)
#  사용법: 사이트주소/admin 접속 → GitHub 로그인 → 글 쓰기 / 수정 / 삭제
#  저장하면 GitHub(conbilab/jopeaceblog)에 커밋되고 Vercel이 자동 배포합니다.
# ============================================================

backend:
  name: github
  repo: conbilab/jopeaceblog
  branch: main

# 이미지 업로드 위치
media_folder: "public/uploads"
public_folder: "/uploads"

locale: ko
i18n:
  structure: single_file
  locales: [ko]
  default_locale: ko

collections:
  # ───────────────── 기록(글) ─────────────────
  - name: records
    label: "기록 (글)"
    label_singular: "글"
    description: "생각·느낌·해본 것·창작·배운 것 — 모든 글을 여기서 쓰고 고치고 지웁니다."
    folder: "src/content/records"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: [date, title, type]
    view_filters:
      - { label: "생각한 것", field: type, pattern: thought }
      - { label: "느낀 것", field: type, pattern: feeling }
      - { label: "창작", field: type, pattern: creative }
      - { label: "배운 것", field: type, pattern: learning }
      - { label: "비공개 초안", field: visibility, pattern: private-draft }
    fields:
      - { name: title, label: "제목", widget: string }
      - { name: date, label: "날짜", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - name: type
        label: "유형"
        widget: select
        default: thought
        options:
          - { label: "💭 생각한 것", value: thought }
          - { label: "🫧 느낀 것", value: feeling }
          - { label: "🛠️ 해본 것", value: action }
          - { label: "✍️ 창작", value: creative }
          - { label: "📖 배운 것", value: learning }
          - { label: "↻ 고친 것", value: revision }
          - { label: "💼 일한 것", value: work }
          - { label: "🍞 먹고 간 곳", value: food-place }
      - name: topic
        label: "주제"
        widget: select
        default: life
        options:
          - { label: "삶", value: life }
          - { label: "일", value: work }
          - { label: "마케팅", value: marketing }
          - { label: "AI", value: ai }
          - { label: "콘텐츠", value: content }
          - { label: "세차의고수", value: sechago }
          - { label: "영어/교육", value: english }
          - { label: "맛과 장소", value: place }
          - { label: "책과 공부", value: book }
          - { label: "사람과 관계", value: people }
      - name: status
        label: "상태"
        widget: select
        default: completed
        options:
          - { label: "🌳 완성", value: completed }
          - { label: "🌿 발전 중", value: growing }
          - { label: "🌱 씨앗", value: seed }
          - { label: "↻ 수정됨", value: revised }
      - name: visibility
        label: "공개 여부"
        widget: select
        default: public
        options:
          - { label: "공개", value: public }
          - { label: "조심해서 공개", value: careful }
          - { label: "비공개 초안(목록에서 숨김)", value: private-draft }
          - { label: "나중에 공개", value: later }
          - { label: "익명화 후 공개", value: anonymized }
      - { name: summary, label: "한 줄 요약", widget: string, required: false }
      - { name: tags, label: "태그", widget: list, required: false }
      - { name: cover, label: "대표 이미지", widget: image, required: false }
      - { name: featured, label: "대표 글로 고정(홈)", widget: boolean, default: false, required: false }
      - { name: question, label: "남은 질문(선택)", widget: string, required: false }
      # 먹고 간 곳 전용(선택)
      - { name: place, label: "🍞 장소명", widget: string, required: false }
      - { name: location, label: "🍞 위치", widget: string, required: false }
      - { name: rating, label: "🍞 평점(0~5)", widget: number, required: false, value_type: float, min: 0, max: 5, step: 0.5 }
      - { name: recommend, label: "🍞 추천", widget: string, required: false }
      - { name: body, label: "본문", widget: markdown }

  # ───────────────── 일과 프로젝트 ─────────────────
  - name: projects
    label: "일과 프로젝트"
    folder: "src/content/projects"
    create: true
    delete: true
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: "이름", widget: string }
      - { name: oneliner, label: "한 줄 설명", widget: string }
      - name: status
        label: "상태"
        widget: select
        default: active
        options:
          - { label: "진행 중", value: active }
          - { label: "완료", value: done }
          - { label: "보류", value: paused }
      - name: topic
        label: "주제"
        widget: select
        default: work
        options: [life, work, marketing, ai, content, sechago, english, place, book, people]
      - { name: period, label: "기간", widget: string, required: false }
      - { name: role, label: "역할", widget: string, required: false }
      - { name: problem, label: "해결하려 한 것", widget: text, required: false }
      - { name: learned, label: "배운 것", widget: text, required: false }
      - { name: order, label: "정렬", widget: number, default: 0, required: false }
      - { name: featured, label: "대표", widget: boolean, default: false, required: false }
      - { name: body, label: "본문", widget: markdown }

  # ───────────────── 나의 기준 ─────────────────
  - name: standards
    label: "나의 기준"
    folder: "src/content/standards"
    create: true
    delete: true
    extension: md
    format: frontmatter
    sortable_fields: [order]
    fields:
      - { name: title, label: "제목", widget: string }
      - { name: summary, label: "한 줄 설명", widget: string }
      - { name: careful, label: "조심하려는 것", widget: text, required: false }
      - { name: action, label: "이렇게 행동하려는 것", widget: text, required: false }
      - { name: order, label: "정렬", widget: number, default: 0 }
      - { name: body, label: "본문", widget: markdown }
